<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#e07a5f">
    <title>Sykli</title>
    
    <!-- Manifest for PWA -->
    <link rel="manifest" href="manifest.json?v=1.0">
    
    <!-- Styles -->
    <link rel="stylesheet" href="style.css?v=1.0">
</head>
<body>
    <!-- Header -->
    <header class="app-header">
        <div class="logo">
            🌙 <span>Sykli</span>
        </div>
        <div class="current-date" id="current-date"></div>
    </header>

    <div class="dashboard-content">

        <!-- Status card -->
        <div class="card" id="status-card">
            <h2>Tänään</h2>
            <div id="cycle-status">
                <!-- Filled by JS -->
            </div>
        </div>

        <!-- Prediction card -->
        <div class="card">
            <h3>Seuraavat kuukautiset</h3>
            <p id="prediction-text" class="status-big">—</p>
            <p id="prediction-sub" style="color: #6b4e4e; font-size: 1.1rem;">Keskimääräinen kierto: <span id="avg-length">28</span> pv</p>
        </div>

        <!-- Quick log -->
        <div class="card">
            <h3>Kirjaa tänään</h3>
            <div class="quick-log-grid">
                <button class="btn-primary" onclick="showLogModal()">
                    📅 Merkitse kuukautisten alku
                </button>
                <button class="btn-secondary" onclick="quickLogSymptom('Kipu')">
                    😣 Kipu
                </button>
                <button class="btn-secondary" onclick="quickLogSymptom('Vuoto')">
                    🩸 Vuoto
                </button>
                <button class="btn-secondary" onclick="quickLogSymptom('Väsymys')">
                    😴 Väsymys
                </button>
            </div>
            <p style="font-size: 0.95rem; color: #888; text-align: center; margin-top: 12px;">
                Kaikki tiedot tallentuvat vain laitteellesi
            </p>
        </div>

        <!-- History -->
        <div class="card">
            <h3>Viimeiset kierrot</h3>
            <ul class="history-list" id="history-list">
                <!-- Filled by JS -->
            </ul>
        </div>

    </div>

    <!-- Bottom navigation -->
    <nav class="bottom-nav">
        <div class="nav-item active" onclick="switchTab(0)">
            🏠<br><span>Etusivu</span>
        </div>
        <div class="nav-item" onclick="switchTab(1)">
            📝<br><span>Kirjaa</span>
        </div>
        <div class="nav-item" onclick="switchTab(2)">
            📅<br><span>Kalenteri</span>
        </div>
        <div class="nav-item" onclick="switchTab(3)">
            ⚙️<br><span>Asetukset</span>
        </div>
    </nav>

    <!-- Log modal -->
    <div class="modal" id="log-modal">
        <div class="modal-content">
            <h3>Merkitse kuukautisten aloitus</h3>
            <label style="display: block; margin-bottom: 8px; font-weight: 500;">Aloituspäivä</label>
            <input type="date" id="period-start-date" style="width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #e8d9d0; font-size: 1.1rem;">
            
            <div style="margin-top: 24px; display: flex; gap: 12px;">
                <button onclick="hideLogModal()" style="flex: 1; padding: 16px; background: #e8d9d0; border: none; border-radius: 9999px; font-weight: 600;">
                    Peruuta
                </button>
                <button onclick="savePeriodStart()" class="btn-primary" style="flex: 1;">
                    Tallenna
                </button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
